services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_data
      - backend_output:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  ingest:
    build: ./backend
    env_file: .env
    environment:
      - CHROMA_PERSIST_DIR=/app/chroma_data
    volumes:
      - chroma_data:/app/chroma_data
    command: python -m scripts.ingest_knowledge
    profiles:
      - init
    depends_on:
      backend:
        condition: service_healthy

volumes:
  chroma_data:
  backend_output:
